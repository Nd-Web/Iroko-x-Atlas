[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:fastapi]
command=uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=1

[program:nextjs]
command=/bin/sh -c "echo 'Waiting for FastAPI...'; until curl -sf http://localhost:8000/health > /dev/null 2>&1; do sleep 2; done; echo 'FastAPI ready — starting Next.js'; node node_modules/.bin/next start --port 3000"
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=2
environment=BACKEND_URL="http://localhost:8000"
