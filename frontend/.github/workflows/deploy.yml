name: Build and Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: irokoregistry2026
  IMAGE_NAME: atlascore-frontend
  WEBAPP_NAME: iroko-frontend
  RESOURCE_GROUP: rg-iroko-hackathon
  AFD_PROFILE_NAME: iroko-frontend-afd
  AFD_ENDPOINT_NAME: iroko-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          images: ${{ env.IMAGE }}

      - name: Purge Azure Front Door cache
        run: |
          az afd endpoint purge \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --profile-name ${{ env.AFD_PROFILE_NAME }} \
            --endpoint-name ${{ env.AFD_ENDPOINT_NAME }} \
            --content-paths "/*" \
            --no-wait
